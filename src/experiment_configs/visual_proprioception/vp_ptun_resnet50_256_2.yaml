name: "ptun-resnet50-256"
# information about the training task
output_size: 6
proprioception_training_task: 'proprio_regressor_training'
proprioception_testing_task: 'proprio_regressor_validation'

# information about the regressor
encoding_size: 256 # should be the same as the encoding
regressor_hidden_size_1: 64
regressor_hidden_size_2: 64
loss: "MSE"

# The number of epochs the MLP is supposed to be trained
epochs: 1000

# information about the sp specified by the exp/run
sensor_processing: 'ResNetProprioTunedSensorProcessing'
sp_experiment: 'sensorprocessing_propriotuned_cnn'
sp_run: 'resnet50_256'

class: 'ResNetProprioTunedSensorProcessing'
latent_size: 256
freeze_feature_extractor: true
reductor_step_1: 64
reductor_step_2: 64
proprio_step_1: 64
proprio_step_2: 64

# the training data in the demonstration / subrun / camera form 
training_data:
  - ["freeform", "2025_03_08__14_15_53", "dev2"]
  - ["freeform", "2025_03_08__14_16_57", "dev2"]

# the testing data in the demonstration / subrun / camera form
testing_data:
  - ["freeform", "2025_03_08__14_19_12", "dev2"]